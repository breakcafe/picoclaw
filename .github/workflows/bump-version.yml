name: Bump version

# Auto-trigger on push is disabled.
# Version numbers now appear in OpenAPI spec examples, deployment guide, and
# Docker build args — not just package.json. Automated patch bumps would leave
# documentation examples stale. Use workflow_dispatch for intentional bumps,
# then update docs/api/openapi.yaml, docs/SERVERLESS_API_DEPLOYMENT_GUIDE.md,
# and regenerate docs/api/openapi.json in the same commit.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate bump logic without commit/push
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version
        run: |
          npm version patch --no-git-tag-version
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry-run mode: skipping commit/push"
            git restore package.json package-lock.json
            exit 0
          fi
          git add package.json package-lock.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: bump version to $VERSION"
          git pull --rebase
          git push
